<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Writings of Vishravars</title>
    <meta name="description"
        content="Personal blog of Vishravars featuring writings, stories, and thoughts in Tamil and English.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.vishravars.me/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.vishravars.me/">
    <meta property="og:title" content="The Writings of Vishravars">
    <meta property="og:description"
        content="Personal blog of Vishravars featuring writings, stories, and thoughts in Tamil and English.">
    <meta property="og:image" content="https://www.vishravars.me/images/banner.png">
    <meta property="og:site_name" content="The Writings of Vishravars">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.vishravars.me/">
    <meta property="twitter:title" content="The Writings of Vishravars">
    <meta property="twitter:description"
        content="Personal blog of Vishravars featuring writings, stories, and thoughts in Tamil and English.">
    <meta property="twitter:image" content="https://www.vishravars.me/images/banner.png">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {{JSON_LD}}
    </script>

    <link rel="alternate" type="application/rss+xml" title="Vishravars Blog RSS Feed" href="rss.xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Serif+Tamil:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfcf9;
            --surface-color: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #505050;
            --accent-color: #2b6cb0;
            --accent-hover: #1a365d;
            --border-color: #e2e8f0;
            --font-sans: 'Inter', 'Noto Sans Tamil', sans-serif;
            --font-serif: 'Noto Serif Tamil', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .banner-container {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .header-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Top Navigation Bar */
        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.9);
        }

        .nav-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .brand-name:hover {
            color: var(--accent-color);
        }

        /* Main Single-Column Content */
        main {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 160px);
        }

        .posts-scroll-container {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding-bottom: 2rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) var(--border-color);
        }

        .posts-scroll-container::-webkit-scrollbar {
            height: 8px;
        }

        .posts-scroll-container::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 4px;
        }

        .posts-scroll-container::-webkit-scrollbar-thumb {
            background-color: var(--accent-color);
            border-radius: 4px;
        }

        article {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid transparent;
        }

        article:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
            border-color: var(--border-color);
        }

        .article-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            display: block;
            font-weight: 500;
        }

        .article-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .article-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .article-title a:hover {
            color: var(--accent-color);
        }

        .article-content {
            font-family: var(--font-serif);
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.65;
        }

        /* Tamil specific typographic adjustment */
        .article-content[lang="ta"] {
            font-size: 1.0rem;
            line-height: 1.75;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .read-more:hover {
            color: var(--accent-hover);
        }

        .read-more svg {
            margin-left: 0.5rem;
            width: 1rem;
            height: 1rem;
            transition: transform 0.2s ease;
        }

        .read-more:hover svg {
            transform: translateX(4px);
        }

        .translate-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .translate-link:hover {
            color: var(--accent-hover);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        /* Responsive */
        @media (max-width: 640px) {
            main {
                padding: 2rem 1rem;
            }

            .nav-container {
                padding: 1rem;
            }

            article {
                padding: 1.5rem;
            }

            .article-title {
                font-size: 1.5rem;
            }

            .nav-button {
                background: var(--surface-color);
                border: 1px solid var(--border-color);
                border-radius: 50%;
                width: 36px;
                height: 36px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: var(--text-primary);
                transition: background 0.2s, color 0.2s;
            }

            .nav-button:hover {
                background: var(--accent-color);
                color: #fff;
                border-color: var(--accent-color);
            }

            .article-content {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="banner-container">
        <img src="/images/banner.png" alt="Vishravars Blog Banner" class="header-banner">
    </div>
    <header>
        <nav class="nav-container">
            <h1 style="font-size: 1.25rem; font-weight: 700; margin: 0; padding: 0; line-height: 1;"><a
                    href="/index.html" class="brand-name">Vishravars</a></h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="/about/" class="brand-name" style="font-size: 1rem; color: var(--text-secondary);" title="About">About</a>
                <a href="mailto:vishravars@gmail.com" class="brand-name"
                    style="font-size: 1rem; color: var(--text-secondary);" title="Contact Me"><svg fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg></a>
                <a href="/rss.xml" class="brand-name" style="font-size: 1rem; color: var(--text-secondary);"
                    title="RSS Feed"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 3v-1a2 2 0 10-4 0v1h4z"></path>
                    </svg></a>
            </div>
        </nav>
    </header>

    <main>
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">Recent Posts</h2>
            <div style="display: flex; gap: 0.75rem;">
                <button class="nav-button" id="scroll-left" aria-label="Scroll Left">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <button class="nav-button" id="scroll-right" aria-label="Scroll Right">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="posts-scroll-container">
            {{POSTS_LIST}}
        </div>
    </main>

    <footer>
        <p style="margin-bottom: 0.5rem;"><a href="mailto:vishravars@gmail.com"
                style="color: var(--text-secondary); text-decoration: none;">Contact: vishravars@gmail.com</a></p>
        <p>&copy; 2026 Vishravars. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.posts-scroll-container');
            const btnLeft = document.getElementById('scroll-left');
            const btnRight = document.getElementById('scroll-right');

            if(container && btnLeft && btnRight) {
                const scrollAmount = 350 + 32; // article width + gap

                btnLeft.addEventListener('click', () => {
                    container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                });

                btnRight.addEventListener('click', () => {
                    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                });
            }
        });
    </script>
</body>

</html>
