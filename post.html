<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        const redirects = {
            '0002': 'seyarkkai-arivu',
            'seyarkkai_arivu': 'seyarkkai-arivu',
            '0001': 'vilayattu',
            'vilayattu': 'vilayattu'
        };

        const params = new URLSearchParams(window.location.search);
        let postId = params.get('post') || (params.get('file') ? params.get('file').replace(/\.txt$/, '') : null);

        if (postId) {
            // Normalize potential underscore variants
            postId = postId.replace(/_/g, '-');
            const targetSlug = redirects[postId] || postId;
            window.location.replace('/posts/' + targetSlug + '/');
        } else {
            window.location.replace('/index.html');
        }
    </script>
</head>
<body>
    <p>Redirecting to the new clean URL... <a href="/index.html">Click here</a> if you are not redirected automatically.</p>
</body>
</html>
