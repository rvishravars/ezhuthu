<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Vishravars</title>
    <!-- Google Fonts for English and Tamil -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e5e7eb;
            --font-sans: 'Inter', 'Noto Sans Tamil', sans-serif;
            --font-serif: 'Noto Serif Tamil', serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background-color: var(--surface-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        header {
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
        .nav-container {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .brand-name:hover { color: var(--accent-color); }
        .back-link {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .back-link svg {
            margin-right: 0.4rem;
            transition: transform 0.2s ease;
        }
        .back-link:hover { color: var(--accent-color); }
        .back-link:hover svg { transform: translateX(-4px); }
        
        main {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 160px);
        }
        
        /* Post Header Styling similar to visu.me */
        .post-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }
        .post-title {
            font-size: clamp(2.15rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        .post-meta {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            display: inline-block;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Content Styling */
        .post-content {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .post-content p {
            margin-bottom: 1.75em;
        }
        .post-content[lang="ta"] {
            font-size: 1.35rem;
            line-height: 2;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        @media (max-width: 640px) {
            .nav-container, main { width: 100%; }
            main { padding: 2.5rem 1.5rem; }
            .post-header { margin-bottom: 2.5rem; text-align: left; }
            .post-meta { border-bottom: none; border-left: 3px solid var(--accent-color); padding-left: 0.75rem; padding-bottom: 0; }
            .post-content { font-size: 1.15rem; }
            .post-content[lang="ta"] { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="brand-name">Vishravars</a>
            <a href="index.html" class="back-link">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Home
            </a>
        </nav>
    </header>

    <main id="post-container">
        <div class="post-header">
            <h1 class="post-title" id="post-title">Loading...</h1>
            <time class="post-meta" id="post-date"></time>
        </div>
        <div class="post-content" id="post-content">
            <!-- Content loaded here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Vishravars. All rights reserved.</p>
    </footer>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const src = params.get('file');
            const title = params.get('title');
            const date = params.get('date');
            const lang = params.get('lang') || 'en';

            if (!src) {
                document.getElementById('post-title').innerText = "Post not found";
                document.getElementById('post-date').style.display = 'none';
                return;
            }

            document.getElementById('post-title').innerText = title || "Untitled";
            document.getElementById('post-title').lang = lang;
            document.getElementById('post-date').innerText = date || "";
            if (!date) document.getElementById('post-date').style.display = 'none';
            document.getElementById('post-content').lang = lang;

            try {
                const response = await fetch(src);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim()).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
                document.getElementById('post-content').innerHTML = paragraphs;
                
                document.title = `${title} - Vishravars`;
            } catch (error) {
                document.getElementById('post-content').innerHTML = `<p style="color: red;">Error loading post: ${src}</p>`;
                console.error(error);
            }
        }
        
        loadPost();
    </script>
</body>
</html>
