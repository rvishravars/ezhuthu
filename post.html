<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Writings of Vishravars</title>
    <!-- Google Fonts for English and Tamil -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e5e7eb;
            --font-sans: 'Inter', 'Noto Sans Tamil', sans-serif;
            --font-serif: 'Noto Serif Tamil', serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background-color: var(--surface-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        header {
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
        .nav-container {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .brand-name:hover { color: var(--accent-color); }
        .back-link {
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .back-link svg {
            margin-right: 0.4rem;
            transition: transform 0.2s ease;
        }
        .back-link:hover { color: var(--accent-color); }
        .back-link:hover svg { transform: translateX(-4px); }
        
        main {
            width: 80%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 160px);
        }
        
        /* Post Header Styling similar to visu.me */
        .post-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }
        .post-title {
            font-size: clamp(2.15rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        .post-meta {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            display: inline-block;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .post-meta-separator {
            border-left: 2px solid var(--border-color);
            padding-left: 1rem;
        }
        .translate-link {
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.5rem;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .translate-link:hover {
            color: var(--accent-hover);
            border-bottom-color: var(--accent-hover);
        }

        /* Content Styling */
        .post-content {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .post-content p {
            margin-bottom: 1.75em;
        }
        .post-content[lang="ta"] {
            font-size: 1.35rem;
            line-height: 2;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--surface-color);
        }

        @media (max-width: 640px) {
            .nav-container, main { width: 100%; }
            main { padding: 2.5rem 1.5rem; }
            .post-header { margin-bottom: 2.5rem; text-align: left; }
            .post-meta, .translate-link { border-bottom: none; border-left: 3px solid var(--accent-color); padding-left: 0.75rem; padding-bottom: 0; }
            .post-meta-separator { border-left: none; padding-left: 0; }
            .post-content { font-size: 1.15rem; }
            .post-content[lang="ta"] { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-container">
            <a href="index.html" class="brand-name">Vishravars</a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="index.html" class="back-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Home
                </a>
                <a href="mailto:vishravars@gmail.com" class="brand-name" style="font-size: 1rem; color: var(--text-secondary);" title="Contact Me"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>
                <a href="rss.xml" class="brand-name" style="font-size: 1rem; color: var(--text-secondary);" title="RSS Feed"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 3v-1a2 2 0 10-4 0v1h4z"></path></svg></a>
            </div>
        </nav>
    </header>

    <main id="post-container">
        <div class="post-header">
            <h1 class="post-title" id="post-title">Loading...</h1>
            <div style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                <time class="post-meta" id="post-date"></time>
                <span class="post-meta post-meta-separator" id="read-time" style="display: none;"></span>
                <a id="translate-link" href="#" target="_blank" class="translate-link post-meta-separator" style="display: none;">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="display: inline-block; vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5c-.006 1.896-.46 3.657-1.251 5.201M12.751 5a17.9 17.9 0 00-3.336-3M9 9a14.57 14.57 0 01-2.588-3M6 9h4.948"></path></svg>
                    Translate to English
                </a>
            </div>
        </div>
        <div class="post-content" id="post-content">
            <!-- Content loaded here -->
        </div>
        
        <div class="share-buttons" id="share-buttons" style="display: none; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color); justify-content: center; gap: 1rem; align-items: center;">
            <span style="color: var(--text-secondary); font-weight: 500;">Share this post:</span>
            <button onclick="sharePost()" style="background: none; border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; color: var(--text-primary); font-family: var(--font-sans); display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s;">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                Share
            </button>
            <a id="share-twitter" href="#" target="_blank" style="text-decoration: none; border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 4px; color: var(--text-primary); font-family: var(--font-sans); display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s;">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                Post
            </a>
            <a id="share-whatsapp" href="#" target="_blank" style="text-decoration: none; border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 4px; color: var(--text-primary); font-family: var(--font-sans); display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s;">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"></path></svg>
                WhatsApp
            </a>
        </div>
    </main>

    <footer>
        <p style="margin-bottom: 0.5rem;"><a href="mailto:vishravars@gmail.com" style="color: var(--text-secondary); text-decoration: none;">Contact: vishravars@gmail.com</a></p>
        <p>&copy; 2026 Vishravars. All rights reserved.</p>
    </footer>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post') || (params.get('file') ? params.get('file').replace(/\.txt$/, '') : null);
            let src = postId ? `${postId}.txt` : null;

            let title = params.get('title') || "Untitled";
            let date = params.get('date') || "";
            let lang = params.get('lang') || 'en';

            if (!postId) {
                document.getElementById('post-title').innerText = "Post not found";
                document.getElementById('post-date').style.display = 'none';
                return;
            }

            // Dynamically fetch metadata from index.html if we are using the clean URL
            if (params.get('post') && !params.get('title')) {
                try {
                    const indexRes = await fetch('index.html');
                    if (indexRes.ok) {
                        const indexText = await indexRes.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(indexText, 'text/html');
                        // Find the post either by its custom ID or its filename
                        const meta = doc.querySelector(`blog-post[id="${postId}"]`) || doc.querySelector(`blog-post[src="${postId}.txt"]`);
                        if (meta) {
                            src = meta.getAttribute('src');
                            title = meta.getAttribute('title') || title;
                            date = meta.getAttribute('date') || date;
                            lang = meta.getAttribute('lang') || lang;
                        }
                    }
                } catch (e) {
                    console.warn("Could not load metadata from index.html", e);
                }
            }
            
            if (!src) {
                document.getElementById('post-title').innerText = "Post not found";
                document.getElementById('post-date').style.display = 'none';
                return;
            }

            document.getElementById('post-title').innerText = title;
            document.getElementById('post-title').lang = lang;
            document.getElementById('post-date').innerText = date;
            if (!date) document.getElementById('post-date').style.display = 'none';
            else document.getElementById('post-date').style.display = 'inline-block';
            document.getElementById('post-content').lang = lang;

            try {
                const response = await fetch(src);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                
                const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim()).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
                document.getElementById('post-content').innerHTML = paragraphs;
                
                // Calculate reading time
                const wordCount = text.trim().split(/\s+/).length;
                const readingTime = Math.max(1, Math.ceil(wordCount / 200));
                const readTimeEl = document.getElementById('read-time');
                readTimeEl.innerText = `${readingTime} min read`;
                readTimeEl.style.display = 'inline-block';
                
                // Configure Google Translate link or Original link
                const translateEl = document.getElementById('translate-link');
                const isTranslated = window.location.hostname.includes('translate.goog');
                
                if (isTranslated) {
                    const originalUrl = new URL(window.location.href);
                    originalUrl.hostname = 'www.vishravars.me';
                    const cleanParams = new URLSearchParams(originalUrl.search);
                    for (const key of [...cleanParams.keys()]) {
                        if (key.startsWith('_x_tr_')) cleanParams.delete(key);
                    }
                    originalUrl.search = cleanParams.toString();
                    
                    translateEl.href = originalUrl.toString();
                    translateEl.target = '_top'; // Escape iframe/proxy
                    translateEl.innerHTML = `
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="display: inline-block; vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5c-.006 1.896-.46 3.657-1.251 5.201M12.751 5a17.9 17.9 0 00-3.336-3M9 9a14.57 14.57 0 01-2.588-3M6 9h4.948"></path></svg>
                        View Original (Tamil)
                    `;
                    translateEl.style.display = 'inline-flex';
                } else if (lang !== 'en') {
                    const liveUrl = window.location.href.replace(window.location.origin, 'https://www.vishravars.me');
                    translateEl.href = `https://translate.google.com/translate?sl=${lang}&tl=en&u=${encodeURIComponent(liveUrl)}`;
                    translateEl.target = '_blank';
                    translateEl.innerHTML = `
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" style="display: inline-block; vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5c-.006 1.896-.46 3.657-1.251 5.201M12.751 5a17.9 17.9 0 00-3.336-3M9 9a14.57 14.57 0 01-2.588-3M6 9h4.948"></path></svg>
                        Translate to English
                    `;
                    translateEl.style.display = 'inline-flex';
                } else {
                    translateEl.style.display = 'none';
                }
                
                // Set up share links
                const shareUrl = encodeURIComponent(window.location.href);
                const shareText = encodeURIComponent(title);
                document.getElementById('share-twitter').href = `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareText}`;
                document.getElementById('share-whatsapp').href = `https://wa.me/?text=${shareText}%20${shareUrl}`;
                document.getElementById('share-buttons').style.display = 'flex';
                
                window.sharePost = () => {
                    if (navigator.share) {
                        navigator.share({ title: title, url: window.location.href });
                    } else {
                        alert('Your browser does not support the native share feature.');
                    }
                };

                document.title = `${title} | The Writings of Vishravars`;
            } catch (error) {
                document.getElementById('post-content').innerHTML = `<p style="color: red;">Error loading post: ${src}</p>`;
                console.error(error);
            }
        }
        
        loadPost();
    </script>
</body>
</html>
